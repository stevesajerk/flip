<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
let video, prevFrame;
let particles = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 50); // Motion blur trail

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        // Check for motion to create sparks
        for (let y = 0; y < video.height; y += 6) {
            for (let x = 0; x < video.width; x += 6) {
                let i = (x + y * video.width) * 4;
                let diff = abs(video.pixels[i] - prevFrame.pixels[i]);
                
                if (diff > 50) { 
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    // Add a new spark at the motion point
                    particles.push(new Spark(sx, sy));
                }
            }
        }
        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }

    // Update and draw sparks
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].show();
        if (particles[i].finished()) {
            particles.splice(i, 1);
        }
    }
    
    // Limit particles to keep it smooth
    if (particles.length > 300) particles.splice(0, 20);
}

class Spark {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = random(-2, 2);
        this.vy = random(-1, -5); // Float upward
        this.alpha = 255;
        this.color = color(255, random(50, 150), 0); // Fire colors (Orange/Red)
    }
    finished() { return this.alpha < 0; }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 5;
    }
    show() {
        noStroke();
        fill(red(this.color), green(this.color), blue(this.color), this.alpha);
        ellipse(this.x, this.y, random(4, 8));
    }
}
</script>
</body>
</html>
