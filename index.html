<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 2000; cursor: pointer;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="startVibe()"><h1>WAKE THE TIME-FREEZER</h1></div>

<script>
let video, prevFrame, frozenFrame;
let freezeTimer = 0;
let isFreezing = false;
let lastMotionTime = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    pixelDensity(1);
}

function startVibe() {
    document.getElementById('overlay').style.display = 'none';
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
}

function draw() {
    background(0, 0, 0, 40);

    if (video && video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        let currentMotion = 0;

        // Process Motion
        for (let y = 0; y < video.height; y += 2) {
            for (let x = 0; x < video.width; x += 2) {
                let i = (x + y * video.width) * 4;
                let diff = dist(video.pixels[i], 0, 0, prevFrame.pixels[i], 0, 0);
                
                if (diff > 50) {
                    currentMotion++;
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    
                    noStroke();
                    fill(0, 255, 204, 150);
                    ellipse(sx, sy, 10, 10);
                }
            }
        }

        // --- THE MAGIC LOGIC ---
        // If there's some movement, but not a lot (standing still/posing)
        if (currentMotion > 50 && currentMotion < 300) {
            freezeTimer++;
            if (freezeTimer > 60 && !isFreezing) { // Held pose for ~1 sec
                frozenFrame = get(); // Capture the current canvas
                isFreezing = true;
                lastMotionTime = millis();
            }
        } else {
            freezeTimer = 0;
        }

        // Show the "Frozen Ghost"
        if (isFreezing && frozenFrame) {
            let age = millis() - lastMotionTime;
            let alpha = map(age, 0, 8000, 255, 0); // Fade out over 8 seconds
            
            push();
            tint(255, alpha);
            image(frozenFrame, 0, 0);
            pop();

            if (alpha <= 0) isFreezing = false;
        }

        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
