<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
let video, prevFrame, frozenImg;
let motionScore = 0;
let freezeThreshold = 45; // Adjust this to make it easier/harder to trigger
let timer = 0;
let flashAlpha = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 45); // Dark background with trail

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        let currentMotion = 0;

        for (let y = 0; y < video.height; y += 2) {
            for (let x = 0; x < video.width; x += 2) {
                let i = (x + y * video.width) * 4;
                let diff = dist(video.pixels[i], 0, 0, prevFrame.pixels[i], 0, 0);
                
                if (diff > 55) {
                    currentMotion++;
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    
                    // RAINBOW TRAILS
                    colorMode(HSB);
                    fill(frameCount % 360, 80, 100);
                    noStroke();
                    ellipse(sx, sy, 12, 12);
                    colorMode(RGB);
                }
            }
        }

        // FREEZE LOGIC: If moving just a little (posing)
        if (currentMotion > 20 && currentMotion < 150) {
            timer++;
            if (timer > 45) { // Held for ~1.5 seconds
                frozenImg = get(); // Take the snapshot
                flashAlpha = 255;  // Trigger the visual flash
                timer = 0;
            }
        } else {
            timer = 0;
        }

        // Draw the Frozen Ghost (Persistent Layer)
        if (frozenImg) {
            push();
            tint(0, 255, 204, 100); // Tint it mint green so it looks like a ghost
            image(frozenImg, 0, 0);
            pop();
        }

        // Draw the Camera Flash
        if (flashAlpha > 0) {
            fill(255, flashAlpha);
            rect(0, 0, width, height);
            flashAlpha -= 10; // Fade the flash out quickly
        }

        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
