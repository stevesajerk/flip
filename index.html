<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 40px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        button { 
            background: none; border: none; color: #555; font-family: monospace; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        button.active { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>
    <div id="ui">
        <button class="active">MIRROR</button>
        <button onclick="alert('Focus logic coming next!')">FOCUS</button>
        <button onclick="alert('Trace logic coming next!')">TRACE</button>
    </div>

<script>
let video;
let poseNet;
let poses = [];
let particles = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(width, height);
    video.hide();

    // Initialize PoseNet to track body parts
    poseNet = ml5.poseNet(video, modelReady);
    poseNet.on('pose', function(results) {
        poses = results;
    });
}

function modelReady() {
    console.log('Vibe AI Ready');
}

function draw() {
    // Semi-transparent background creates the "trail" effect
    background(5, 5, 5, 25);

    if (poses.length > 0) {
        let pose = poses[0].pose;
        
        // Create particles at key body points (Nose, Hands)
        for (let i = 0; i < 5; i++) {
            particles.push(new Particle(pose.nose.x, pose.nose.y));
            if (pose.leftWrist.confidence > 0.5) {
                particles.push(new Particle(pose.leftWrist.x, pose.leftWrist.y));
            }
            if (pose.rightWrist.confidence > 0.5) {
                particles.push(new Particle(pose.rightWrist.x, pose.rightWrist.y));
            }
        }
    }

    // Update and show particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].show();
        if (particles[i].finished()) {
            particles.splice(i, 1);
        }
    }
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = random(-2, 2);
        this.vy = random(-2, 2);
        this.alpha = 255;
        this.color = color(0, 255, 204); // Electric Mint
    }

    finished() { return this.alpha < 0; }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 3;
    }

    show() {
        noStroke();
        fill(0, 255, 204, this.alpha);
        ellipse(this.x, this.y, 8);
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
