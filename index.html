<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 1000; cursor: pointer;
        }
        #console {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            font-size: 10px; z-index: 1100; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="console">V1.4: Direct Pixel Mode</div>
    <div id="overlay" id="overlay">
        <h1>TAP TO INITIALIZE V1.4</h1>
    </div>

<script>
// All p5.js code lives inside the instance so createCapture, image(), etc. are in scope
const sketch = (p) => {
    let video;
    let bodySegmentation;
    let segment;
    let isReady = false;
    let started = false;

    p.setup = () => {
        p.createCanvas(window.innerWidth, window.innerHeight);
        p.background(0);

        // Hook the overlay click here so `p` is in scope
        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            startEverything();
        });
    };

    function startEverything() {
        if (started) return;
        started = true;

        video = p.createCapture(p.VIDEO, () => {
            const options = {
                runtime: 'mediapipe',
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
            };
            bodySegmentation = ml5.bodySegmentation('selfieSegmentation', options, () => {
                isReady = true;
                document.getElementById('console').innerText = 'V1.4: ACTIVE';
            });
        });
        video.size(640, 480);
        video.hide();
    }

    p.draw = () => {
        p.background(0, 0, 0, 50);

        if (isReady && video) {
            bodySegmentation.detect(video, (result) => {
                segment = result.mask;
            });
        }

        if (segment) {
            p.push();
            p.translate(p.width, 0);
            p.scale(-1, 1);
            p.image(segment, 0, 0, p.width, p.height);
            p.pop();
        }

        // Heartbeat dot — visible even before camera starts
        p.noStroke();
        p.fill(0, 255, 204, 150);
        p.ellipse(20, 20, 8, 8);
    };

    p.windowResized = () => {
        p.resizeCanvas(window.innerWidth, window.innerHeight);
    };
};

new p5(sketch);
</script>
</body>
</html>
