<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 1000; cursor: pointer;
        }
        #console {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            font-size: 10px; z-index: 1100; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="console">V1.4: Direct Pixel Mode</div>
    <div id="overlay" onclick="startEverything()">
        <h1>TAP TO INITIALIZE V1.4</h1>
    </div>

<script>
let video;
let bodySegmentation;
let segment;
let isReady = false;

function startEverything() {
    document.getElementById('overlay').style.display = 'none';
    
    // Using simple video capture
    video = createCapture(VIDEO, () => {
        const options = {
            runtime: 'mediapipe',
            solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
        };
        bodySegmentation = ml5.bodySegmentation('selfieSegmentation', options, () => {
            isReady = true;
            document.getElementById('console').innerText = "V1.4: ACTIVE";
        });
    });
    video.size(640, 480);
    video.hide();
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    background(0);
}

function draw() {
    // We use a slightly heavier fade to prevent ghosting issues
    background(0, 0, 0, 50); 

    if (isReady && video) {
        bodySegmentation.detect(video, (result) => {
            segment = result.mask;
        });
    }
    
    if (segment) {
        // Instead of image(), we use the p5 graphics buffer
        push();
        translate(width, 0);
        scale(-1, 1);
        
        // This is a "Force Draw" 
        // We draw the mask at the full size of the canvas
        image(segment, 0, 0, width, height);
        
        // Let's add a "fallback" circle that follows the middle of the screen
        // so we know the draw loop is actually running
        pop();
        
        noStroke();
        fill(0, 255, 204, 100);
        // If the screen is still black, this tiny dot in the corner 
        // will tell us if the p5.js draw loop is alive.
        ellipse(20, 20, 5, 5); 
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
