<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #ff0000; overflow: hidden; } /* Red background to see if it loads at all */
    </style>
</head>
<body>
<script>
function setup() {
    // Create a very small, simple canvas first
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    background(0); // Black background

    // DRAW A HUGE MINT CIRCLE AT MOUSE/TOUCH
    fill(0, 255, 204);
    noStroke();
    ellipse(mouseX, mouseY, 100, 100);

    // DRAW A WHITE BOX IN THE CENTER
    fill(255);
    rect(width/2 - 25, height/2 - 25, 50, 50);
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
