<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 1000; cursor: pointer;
            font-family: sans-serif; letter-spacing: 5px;
        }
        /* This makes the canvas glow like a neon sign */
        canvas { filter: brightness(1.5) contrast(1.2) drop-shadow(0 0 20px #00ffcc); }
    </style>
</head>
<body>
    <div id="overlay" onclick="startEverything()">
        <h1>WAKE VIBE STATION</h1>
    </div>

<script>
let video;
let bodySegmentation;
let segment;
let isReady = false;

function startEverything() {
    document.getElementById('overlay').style.display = 'none';
    video = createCapture(VIDEO, () => {
        bodySegmentation = ml5.bodySegmentation('selfieSegmentation', { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation' }, () => {
            isReady = true;
        });
    });
    video.size(640, 480);
    video.hide();
}

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    // Solid black background to make the neon pop
    // Change the '10' to '255' if you want NO trails at all
    background(0, 0, 0, 40); 

    if (isReady && video) {
        bodySegmentation.detect(video, (result) => {
            segment = result.mask;
        });
    }
    
    if (segment) {
        push();
        // Mirror the view
        translate(width, 0);
        scale(-1, 1);
        
        // --- THE NEON FIX ---
        // We use 'Exclusion' or 'Screen' blend mode for that high-end art look
        blendMode(ADD); 
        tint(0, 255, 204, 255); // Full opacity Mint
        image(segment, 0, 0, width, height);
        
        // Layering a second slightly offset copy creates a "vibrating" neon effect
        tint(0, 200, 255, 100); 
        image(segment, 5, 0, width, height);
        
        pop();
        blendMode(BLEND); // Reset blend mode for other elements
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
