<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; font-family: monospace; } </style>
</head>
<body>
<script>
let video, prevFrame, frozenImg;
let timer = 0;
let flashAlpha = 0;
let ghostAlpha = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 40); 

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        let totalMotion = 0;

        // Draw Motion Particles
        for (let y = 0; y < video.height; y += 3) {
            for (let x = 0; x < video.width; x += 3) {
                let i = (x + y * video.width) * 4;
                let diff = dist(video.pixels[i], 0, 0, prevFrame.pixels[i], 0, 0);
                
                if (diff > 45) {
                    totalMotion++;
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    
                    noStroke();
                    fill(0, 255, 204, 200); // Bright Mint
                    ellipse(sx + random(-5,5), sy + random(-5,5), 15, 15);
                }
            }
        }

        // --- FREEZE LOGIC ---
        if (totalMotion > 10 && totalMotion < 150) {
            timer += 2;
            // Visual feedback: A ring that closes in on the center
            noFill();
            stroke(255);
            strokeWeight(4);
            ellipse(width/2, height/2, 500 - (timer*4), 500 - (timer*4));
            
            fill(255);
            noStroke();
            textAlign(CENTER);
            textSize(40);
            text("HOLD POSE...", width/2, height/2 + 300);

            if (timer > 120) { 
                frozenImg = get(); // Take the photo
                flashAlpha = 255;
                ghostAlpha = 255; 
                timer = 0;
            }
        } else {
            timer = max(0, timer - 2);
        }

        // Draw the Frozen Ghost (Persistent Layer)
        if (frozenImg && ghostAlpha > 0) {
            push();
            tint(0, 255, 204, ghostAlpha); 
            image(frozenImg, 0, 0);
            pop();
            ghostAlpha -= 0.8; // Fades out over about 15 seconds
        }

        // The White Flash
        if (flashAlpha > 0) {
            fill(255, flashAlpha);
            rect(0, 0, width, height);
            flashAlpha -= 20;
        }

        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}
</script>
</body>
</html>
