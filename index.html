<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
let video, prevFrame;

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
    background(0);
}

function draw() {
    // Very faint fade creates long-lasting "Burn-in" neon trails
    background(0, 0, 0, 20); 

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        // Use ADD mode to make colors "Glow" and "Stack"
        blendMode(ADD);
        
        for (let y = 0; y < video.height; y += 4) {
            for (let x = 0; x < video.width; x += 4) {
                let i = (x + y * video.width) * 4;
                let diff = dist(video.pixels[i], video.pixels[i+1], video.pixels[i+2], 
                                prevFrame.pixels[i], prevFrame.pixels[i+1], prevFrame.pixels[i+2]);
                
                if (diff > 55) { 
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    
                    // Generate a "Lightning Bolt" stroke
                    strokeWeight(random(5, 15));
                    
                    // Cycle through Cyberpunk colors
                    let r = map(sin(frameCount * 0.1), -1, 1, 100, 255);
                    let g = map(cos(frameCount * 0.1), -1, 1, 0, 255);
                    stroke(r, g, 255, 180);
                    
                    // Draw a jagged line from movement point
                    line(sx, sy, sx + random(-40, 40), sy + random(-40, 40));
                    
                    // Add a bright core dot
                    noStroke();
                    fill(255, 255, 255, 200);
                    ellipse(sx, sy, 8, 8);
                }
            }
        }
        blendMode(BLEND); // Reset blend mode for video processing
        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
