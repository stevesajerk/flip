<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
let video;

function setup() {
    createCanvas(windowWidth, windowHeight);
    // We use a slightly higher resolution for a better "Human" shape
    video = createCapture(VIDEO);
    video.size(320, 240); 
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 80); // Create a "trailing" ghost effect

    if (video.loadedmetadata) {
        video.loadPixels();
        
        // We scan the video in "Scanlines" (horizontal rows)
        for (let y = 0; y < video.height; y += 4) {
            for (let x = 0; x < video.width; x += 4) {
                let i = (x + y * video.width) * 4;
                
                // Get the brightness of the pixel
                let r = video.pixels[i];
                let g = video.pixels[i+1];
                let b = video.pixels[i+2];
                let bright = (r + g + b) / 3;

                // THRESHOLD: Only draw if the pixel is bright (you)
                // If the room is dark and you are lit, this creates a perfect silhouette
                if (bright > 80) { 
                    let sx = map(x, video.width, 0, 0, width); // Mirror it
                    let sy = map(y, 0, video.height, 0, height);
                    
                    blendMode(ADD);
                    
                    // Draw a glowing horizontal "Data Beam"
                    strokeWeight(random(2, 6));
                    
                    // Cyberpunk Teal/Mint Color
                    stroke(0, 255, 204, 150);
                    
                    // The line length changes based on how bright you are
                    let lineLen = map(bright, 80, 255, 10, 60);
                    line(sx - lineLen, sy, sx + lineLen, sy);
                    
                    // Add a tiny white "Spark" in the center of the beam
                    stroke(255, 255, 255, 200);
                    strokeWeight(2);
                    point(sx, sy);
                    
                    blendMode(BLEND);
                }
            }
        }
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
