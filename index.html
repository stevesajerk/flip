<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="startEverything()"><h1>WAKE THE INFERNO V3.1</h1></div>

<script>
let video;
let bodySegmentation;
let segmentMask;
let isReady = false;

function startEverything() {
    document.getElementById('overlay').style.display = 'none';
    
    video = createCapture(VIDEO, () => {
        // Options to use MediaPipe (much faster)
        const options = {
            runtime: 'mediapipe', 
            solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
        };
        bodySegmentation = ml5.bodySegmentation('selfieSegmentation', options, () => {
            isReady = true;
        });
    });
    video.size(320, 240); // Lower res for better performance
    video.hide();
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    pixelDensity(1); 
}

function draw() {
    background(0, 0, 0, 15); // Deep trails for flame look

    if (isReady && video) {
        bodySegmentation.detect(video, (result) => {
            segmentMask = result.mask;
        });
    }
    
    if (segmentMask) {
        push();
        translate(width, 0);
        scale(-1, 1);
        
        // --- THE INFERNO EFFECT ---
        blendMode(ADD); 
        
        // Layer 1: The Deep Blue/Red Base
        tint(0, 255); 
        image(segmentMask, 0, 0, width, height);
        
        // Layer 2: The Core Heat (Yellows)
        tint(60, 255); 
        image(segmentMask, random(-5,5), random(-5,5), width, height);
        
        // Layer 3: The Pulse (HSB Gradient)
        colorMode(HSB);
        for (let i = 0; i < height; i += 20) {
            let hue = map(i, 0, height, 0, 40); // Shift from yellow to red down the body
            let sat = map(i, 0, height, 200, 255);
            tint(hue, sat, 255, 100);
            
            // This crops the mask into small strips and paints them a gradient color
            let yPos = map(i, 0, height, 0, height);
            let ySize = map(20, 0, height, 0, height);
            image(segmentMask, 0, yPos, width, ySize, 0, i, video.width, 20);
        }
        
        pop();
        
        blendMode(BLEND); // Reset
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
