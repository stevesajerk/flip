<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; } </style>
</head>
<body>
<script>
let video, prevFrame, frozenImg;
let poseStartTime = 0;
let isPosing = false;
let flashAlpha = 0;
let ghostAlpha = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 40); 

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        let totalMotion = 0;

        // Draw Motion
        for (let y = 0; y < video.height; y += 4) {
            for (let x = 0; x < video.width; x += 4) {
                let i = (x + y * video.width) * 4;
                let diff = dist(video.pixels[i], video.pixels[i+1], video.pixels[i+2], 
                                prevFrame.pixels[i], prevFrame.pixels[i+1], prevFrame.pixels[i+2]);
                
                if (diff > 50) { 
                    totalMotion++;
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    fill(0, 255, 204, 150);
                    noStroke();
                    ellipse(sx, sy, 15, 15);
                }
            }
        }

        // --- NEW TIME-BASED LOGIC ---
        // If motion is low, start/continue the timer
        if (totalMotion > 2 && totalMotion < 120) {
            if (!isPosing) {
                poseStartTime = millis();
                isPosing = true;
            }

            let elapsed = millis() - poseStartTime;
            let remaining = 3000 - elapsed; // 3 second countdown

            // Visual Ring
            noFill();
            stroke(0, 255, 204);
            strokeWeight(15);
            let ringSize = map(remaining, 3000, 0, 600, 0);
            ellipse(width/2, height/2, max(0, ringSize), max(0, ringSize));

            // Text Countdown
            fill(255);
            noStroke();
            textAlign(CENTER);
            textSize(100);
            text(ceil(remaining/1000), width/2, height/2 + 30);

            if (remaining <= 0) {
                frozenImg = get();
                flashAlpha = 255;
                ghostAlpha = 255;
                isPosing = false; // Reset
            }
        } else {
            isPosing = false; // Reset if they move too much or walk away
        }

        // Display Ghost
        if (frozenImg && ghostAlpha > 0) {
            push();
            tint(0, 255, 204, ghostAlpha);
            image(frozenImg, 0, 0);
            pop();
            ghostAlpha -= 0.5;
        }

        // Flash
        if (flashAlpha > 0) {
            fill(255, flashAlpha);
            rect(0, 0, width, height);
            flashAlpha -= 20;
        }

        // DEBUG MOTION BAR (Bottom of screen)
        fill(totalMotion < 120 ? 'green' : 'red');
        rect(0, height-10, map(totalMotion, 0, 200, 0, width), 10);

        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}
</script>
</body>
</html>
