<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; color: #00ffcc; z-index: 1000; cursor: pointer;
        }
        #console {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            font-size: 10px; z-index: 1100; pointer-events: none; opacity: 0.7;
        }
        #version-tag {
            position: absolute; bottom: 15px; right: 20px;
            color: rgba(0, 255, 204, 0.4); font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="console">System: Initializing...</div>
    <div id="version-tag">VIBE_STATION_V1.3</div>
    
    <div id="overlay" onclick="startEverything()">
        <h1>TAP TO START V1.3</h1>
    </div>

<script>
let video;
let bodySegmentation;
let segment;
let isReady = false;
let log = document.getElementById('console');

function updateLog(msg) {
    log.innerHTML += "<br>> " + msg;
    console.log(msg);
}

function startEverything() {
    document.getElementById('overlay').style.display = 'none';
    updateLog("Requesting Camera...");
    
    video = createCapture(VIDEO, (stream) => {
        updateLog("Camera Stream Active.");
        updateLog("Loading AI Model (Selfie)...");
        
        const options = {
            runtime: 'mediapipe',
            solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
        };

        bodySegmentation = ml5.bodySegmentation('selfieSegmentation', options, () => {
            updateLog("AI MODEL LOADED.");
            isReady = true;
        });
    });
    
    video.size(640, 480);
    video.hide();
}

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    background(0, 0, 0, 40); 

    if (isReady && video) {
        bodySegmentation.detect(video, (result) => {
            segment = result.mask;
        });
    }
    
    if (segment) {
        push();
        translate(width, 0);
        scale(-1, 1);
        blendMode(ADD);
        tint(0, 255, 204, 255); 
        image(segment, 0, 0, width, height);
        pop();
        blendMode(BLEND);
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
