<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; }
        #debug-text { position: absolute; top: 10px; left: 10px; font-family: monospace; z-index: 1000; }
    </style>
</head>
<body>
    <div id="debug-text">Status: Initializing...</div>
    <div id="ui" style="position: absolute; bottom: 20px; width: 100%; text-align: center;">
        <button style="color: #00ffcc;">MIRROR ACTIVE</button>
    </div>

<script>
let video;
let poseNet;
let statusText;

function setup() {
    createCanvas(windowWidth, windowHeight);
    statusText = document.getElementById('debug-text');
    
    // Attempt to start camera
    video = createCapture(VIDEO, function(stream) {
        statusText.innerText = "Status: Camera Connected. Loading AI...";
    });
    video.size(640, 480);
    video.hide();

    // Initialize AI
    poseNet = ml5.poseNet(video, modelLoaded);
}

function modelLoaded() {
    statusText.innerText = "Status: EVERYTHING READY. Move around!";
}

function draw() {
    background(5, 5, 5);

    // DRAW RAW VIDEO IN CORNER (FOR DEBUGGING)
    image(video, 0, 0, 160, 120); 

    if (poseNet && mouseIsPressed) {
        fill(0, 255, 204);
        ellipse(mouseX, mouseY, 20);
        statusText.innerText = "Status: Touch/Click detected";
    }
}
</script>
</body>
</html>
