<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; } </style>
</head>
<body>
<script>
let video, prevFrame, frozenImg;
let poseStartTime = 0;
let isPosing = false;
let flashAlpha = 0;
let ghostAlpha = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    video = createCapture(VIDEO);
    video.size(160, 120);
    video.hide();
    pixelDensity(1);
}

function draw() {
    background(0, 0, 0, 45); 

    if (video.loadedmetadata) {
        video.loadPixels();
        if (!prevFrame) prevFrame = createImage(video.width, video.height);
        prevFrame.loadPixels();

        let totalMotion = 0;

        for (let y = 0; y < video.height; y += 6) {
            for (let x = 0; x < video.width; x += 6) {
                let i = (x + y * video.width) * 4;
                let diff = abs(video.pixels[i] - prevFrame.pixels[i]);
                
                if (diff > 50) { 
                    totalMotion++;
                    let sx = map(x, video.width, 0, 0, width);
                    let sy = map(y, 0, video.height, 0, height);
                    fill(0, 255, 204, 180);
                    noStroke();
                    ellipse(sx, sy, 30, 30);
                }
            }
        }

        // --- THE FIXED FINISH LINE ---
        if (totalMotion > 2 && totalMotion < 300) { 
            if (!isPosing) {
                poseStartTime = millis();
                isPosing = true;
            }

            let elapsed = millis() - poseStartTime;
            let remaining = 3000 - elapsed; 

            if (remaining > 0) {
                // Visual Countdown
                noFill(); stroke(0, 255, 204); strokeWeight(20);
                let ringSize = map(remaining, 3000, 0, 600, 100);
                ellipse(width/2, height/2, ringSize, ringSize);
                
                fill(255); noStroke(); textAlign(CENTER, CENTER); textSize(150);
                text(ceil(remaining/1000), width/2, height/2);
            } else {
                // SUCCESS: TRIGGER THE PHOTO
                frozenImg = get(); 
                flashAlpha = 255;
                ghostAlpha = 255;
                isPosing = false; 
                poseStartTime = 0;
            }
        } else if (totalMotion > 300) {
            isPosing = false; // Reset if they move too much
        }

        // Display Ghost
        if (frozenImg && ghostAlpha > 0) {
            push();
            tint(0, 255, 204, ghostAlpha);
            image(frozenImg, 0, 0);
            pop();
            ghostAlpha -= 1.5; // Slowly fades away
        }

        // Flash
        if (flashAlpha > 0) {
            fill(255, flashAlpha);
            rect(0, 0, width, height);
            flashAlpha -= 15;
        }

        prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
    }
}
</script>
</body>
</html>
