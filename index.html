<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: monospace; overflow: hidden; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 1000; cursor: pointer;
        }
        #status { position: absolute; top: 20px; left: 20px; font-size: 12px; z-index: 1100; }
    </style>
</head>
<body>
    <div id="status">System: Waiting for Interaction...</div>
    <div id="overlay" onclick="startEverything()">
        <h1>TAP TO WAKE VIBE</h1>
    </div>

<script>
let video;
let bodySegmentation;
let mask;
let isReady = false;

function startEverything() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('status').innerText = "System: Loading AI Model...";
    
    // Create the video capture
    video = createCapture(VIDEO, () => {
        // Once video is live, start the AI
        bodySegmentation = ml5.bodySegmentation('selfieSegmentation', { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation' }, modelLoaded);
    });
    video.size(640, 480);
    video.hide();
}

function modelLoaded() {
    isReady = true;
    document.getElementById('status').innerText = "System: ACTIVE - Vibe is Live";
}

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    background(5, 5, 5, 40); // Motion trail effect

    if (isReady && video) {
        // Detect person
        bodySegmentation.detect(video, gotResults);
    }
    
    if (mask) {
        // Draw the "Mirror" silhouette
        push();
        // Flip the image so it acts like a mirror
        translate(width, 0);
        scale(-1, 1);
        
        // Draw the glowing silhouette
        tint(0, 255, 204, 150); // Electric Mint color
        image(mask, 0, 0, width, height);
        pop();
    }
}

function gotResults(result) {
    mask = result.mask;
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
